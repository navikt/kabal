version: 2

updates:
  - package-ecosystem: bun
    directories:
      - /
      - /frontend
      - /server
      - /file-viewer
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - minor
          - patch
        group-by: dependency-name

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns:
          - "*"
